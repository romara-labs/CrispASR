name: crispasr
description: Lightweight on-device speech recognition via ggml. Supports Whisper, Qwen3-ASR, FastConformer, and more.
version: 0.5.10
homepage: https://github.com/CrispStrobe/CrispASR

environment:
  # 3.1.0+: chat.dart uses NativeCallable.listener and Array<Int8> inline
  # struct fields, both of which were stabilised in Dart 3.1. The rest
  # of the package compiles fine on 3.0; upgrading to 3.1 is the lowest
  # bar that lets the chat ABI bind.
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  ffi: ^2.0.0

dev_dependencies:
  test: ^1.24.0
  # `Pointer<Utf8>` and `toDartString` come from `package:ffi`, which is a
  # runtime dep — nothing else needed for the smoke tests.
